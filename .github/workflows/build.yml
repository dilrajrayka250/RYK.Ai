name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      # यह स्टेप APK बनाने की कोशिश करेगा (React Native के लिए)
      - name: Build Android Release
        run: |
          cd android && ./gradlew assembleDebug || echo "Android folder not found"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: "**/*.apk"

          
