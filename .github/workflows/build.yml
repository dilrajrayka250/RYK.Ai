name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        # यहाँ बदलाव किया है ताकि Lockfile वाली एरर न आए
        run: pnpm install --no-frozen-lockfile

      - name: Build Android Release
        run: |
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Android folder not found, checking Expo build..."
            npx expo export --platform android || echo "Expo export failed"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: "**/*.apk"
          
