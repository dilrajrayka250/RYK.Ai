name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Android
        run: |
          # यह कमांड पूरे प्रोजेक्ट में कहीं भी APK ढूँढकर उसे जनरेट करने की कोशिश करेगी
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            npx expo run:android --variant debug || echo "Manual build failed, checking files..."
          fi

      - name: Upload All APKs
        uses: actions/upload-artifact@v4
        with:
          name: my-app-files
          path: "**/*.apk" # यह पूरे प्रोजेक्ट में जहाँ भी APK बनेगी, उसे खींच लाएगा
          
